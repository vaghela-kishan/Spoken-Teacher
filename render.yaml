# ============================================================
#  Render Blueprint — deploys the whole app in one click.
#  Render reads this file automatically when you create a
#  "New + > Blueprint" and point it at this repo.
#
#    • spoken-teacher-api  → FastAPI backend (Docker, free plan)
#    • spoken-teacher-web  → React/Vite frontend (static site, free)
#
#  Uses SQLite (no external database needed / free). Data resets on
#  redeploy — fine for a demo. Swap DATABASE_URL for a Postgres URL
#  (and set ENVIRONMENT=production) later if you need persistence.
# ============================================================

services:
  # ---------------- Backend API ----------------
  - type: web
    name: spoken-teacher-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: development            # keeps SQLite allowed (no paid DB)
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./dev.db
      - key: TTS_ENGINE
        value: browser
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: REDIS_URL
        value: ""                     # empty => in-memory fallback
      - key: SECRET_KEY
        generateValue: true           # Render generates a secure random value
      - key: GROQ_API_KEY
        sync: false                   # <-- you paste this in the dashboard
      - key: BACKEND_CORS_ORIGINS
        sync: false                   # <-- set to the frontend URL after deploy
      - key: FRONTEND_URL
        sync: false                   # <-- set to the frontend URL after deploy

  # ---------------- Frontend (static) ----------------
  - type: web
    name: spoken-teacher-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    # SPA fallback so client-side routes work on refresh
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false                   # <-- set to the backend URL after deploy
      - key: VITE_WS_URL
        sync: false                   # <-- set to the backend URL (wss://) after deploy
